name: Style Enforcement

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  enforce-style:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Clang-Format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check Formatting
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            echo "Checking $file"
            if ! timeout 10s clang-format --dry-run --Werror -style=file "$file"; then
              echo "ERROR: clang-format failed or timed out on $file"
              exit 1
            fi
          done < <(git ls-files -z -- '*.cpp' '*.hpp' '*.h')

      - name: Static Analysis (Safety Check)
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck
          cppcheck --enable=warning,style,performance --error-exitcode=1 .